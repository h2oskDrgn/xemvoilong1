<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch Sử Xem - Xem Với Long</title>
  <link rel="icon" href="assets/logo.png?v=4" type="image/png">
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>

<header>
  <button class="menu-toggle" id="menu-toggle" aria-label="Menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 12h18M3 6h18M3 18h18"/>
    </svg>
  </button>
  <a href="index.html" class="logo-wrap">
    <img src="assets/logo.png?v=4" alt="Xem Với Long Logo">
  </a>
  <nav>
    <a href="index.html">Trang Chủ</a>
    <a href="index.html?type=phim-le">Phim Lẻ</a>
    <a href="index.html?type=phim-bo">Phim Bộ</a>
    <a href="index.html?type=hoat-hinh">Anime</a>
    <a href="history.html" class="active">Lịch Sử</a>
  </nav>
  <div class="header-search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="Tìm phim..." id="search-header" autocomplete="off"
      onkeydown="if(event.key==='Enter'){window.location='index.html?q='+encodeURIComponent(this.value);}">
    <button onclick="window.location='index.html'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="btn-login" title="Đăng nhập">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
    <div class="user-menu" id="user-menu" style="display:none">
      <div class="user-avatar" id="user-avatar" title="Tài khoản">?</div>
      <div class="user-dropdown">
        <div class="user-info-panel">
          <div class="user-info-name" id="user-name">User</div>
          <div class="user-info-sub">Thành viên</div>
        </div>
        <a class="dropdown-item" href="history.html">Lịch sử xem</a>
        <div class="dropdown-item danger" id="btn-logout">Đăng xuất</div>
      </div>
    </div>
  </div>
</header>

<div class="mobile-nav" id="mobile-nav">
  <a href="index.html">Trang Chủ</a>
  <a href="index.html?type=phim-le">Phim Lẻ</a>
  <a href="index.html?type=phim-bo">Phim Bộ</a>
  <a href="index.html?type=hoat-hinh">Anime</a>
  <a href="history.html" class="active">Lịch Sử</a>
</div>

<main>
  <div class="container">
    <div class="page-header">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <h1 class="page-header-title">Lịch Sử Xem</h1>
          <p class="page-header-sub" id="history-count">Đang tải...</p>
        </div>
        <button class="clear-btn" id="btn-clear">Xóa Tất Cả</button>
      </div>
    </div>

    <div id="history-list"></div>
  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-bottom">
      © 2024 <span>Xem Với Long</span> · Phim Hay - Share Ngay
    </div>
  </div>
</footer>

<!-- Auth Modal -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Tài Khoản</div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" data-tab="login">Đăng Nhập</button>
      <button class="modal-tab" data-tab="register">Đăng Ký</button>
    </div>
    <div class="tab-panel" data-panel="login">
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Tên tài khoản</label>
          <input class="form-input" type="text" id="login-user" placeholder="Nhập tên tài khoản" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <input class="form-input" type="password" id="login-pass" placeholder="Nhập mật khẩu" autocomplete="current-password">
        </div>
        <div class="form-error" id="login-error"></div>
        <button class="form-submit" type="submit">Đăng Nhập</button>
      </form>
    </div>
    <div class="tab-panel" data-panel="register" style="display:none">
      <form id="reg-form">
        <div class="form-group">
          <label class="form-label">Tên tài khoản</label>
          <input class="form-input" type="text" id="reg-user" placeholder="Ít nhất 3 ký tự" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <input class="form-input" type="password" id="reg-pass" placeholder="Ít nhất 4 ký tự" autocomplete="new-password">
        </div>
        <div class="form-error" id="reg-error"></div>
        <button class="form-submit" type="submit">Tạo Tài Khoản</button>
      </form>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/api.js?v=4"></script>
<script src="js/auth.js?v=4"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  renderHistory();

  document.getElementById('btn-clear')?.addEventListener('click', () => {
    if (confirm('Xóa toàn bộ lịch sử xem?')) {
      History.clear();
      Object.keys(localStorage).filter(k => k.startsWith('xvl_time_')).forEach(k => localStorage.removeItem(k));
      renderHistory();
      showToast('Đã xóa lịch sử xem');
    }
  });
});

function renderHistory() {
  const list    = History.get();
  const el      = document.getElementById('history-list');
  const countEl = document.getElementById('history-count');
  if (!el) return;

  if (countEl) countEl.textContent = list.length ? `${list.length} phim đã xem` : 'Chưa có phim nào';

  if (!list.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="icon" style="font-size:48px;opacity:0.3">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M10 8l6 4-6 4V8z"/></svg>
      </div>
      <h3>Chưa có lịch sử xem</h3>
      <p>Các phim bạn đã xem sẽ hiện ở đây.</p>
      <a href="index.html" style="display:inline-block;margin-top:16px" class="btn-primary">Xem Phim Ngay</a>
    </div>`;
    return;
  }

  el.innerHTML = list.map(m => {
    const time   = ResumeTime.get(m.slug);
    const date   = new Date(m.watchedAt);
    const dateStr = date.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    const imgEl  = m.poster_url
      ? `<img class="history-poster" src="${esc(m.poster_url)}" alt="${esc(m.name)}" onerror="this.style.display='none'">`
      : `<div class="history-poster" style="background:var(--bg3);display:flex;align-items:center;justify-content:center;opacity:0.4">
           <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M10 8l6 4-6 4V8z"/></svg>
         </div>`;

    return `<a class="history-item" href="movie.html?slug=${encodeURIComponent(m.slug)}&server=${m._server || 'kkphim'}">
      ${imgEl}
      <div class="history-info">
        <div class="history-title">${esc(m.name)}</div>
        <div class="history-meta">${m.year ? m.year + ' · ' : ''}${dateStr}</div>
        ${time > 5 ? `
        <div class="history-progress">
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Xem đến ${fmtTime(time)}</div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:30%"></div></div>
        </div>` : ''}
      </div>
      <div style="flex-shrink:0;color:var(--text-muted)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </div>
    </a>`;
  }).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
